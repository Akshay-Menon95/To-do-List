<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .card {
            background-color: #3300ff;
            color: #ffffff;
            width: 100%;
            max-width: 360px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(51, 0, 255, 0.15);
            text-align: left;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 28px;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.2);
        }

        input[type="submit"] {
            margin-top: 10px;
            padding: 12px;
            background-color: #ffffff;
            color: #3300ff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        input[type="submit"]:hover {
            opacity: 0.9;
        }

        input[type="submit"]:active {
            transform: scale(0.98);
        }

        form a {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 8px;
            transition: color 0.2s ease;
        }

        form a:hover {
            color: #ffffff;
            text-decoration: underline !important;
        }
    </style>
</head>

<body>
    <div class="card-container">
        <div class="card">
            <h2>Register</h2>

            <form method="post">
                {% csrf_token %}
                <label>Name: <input type="text" name="username"></label>

                <label>Email: <input type="email" name="email"></label>

                <label>Password: <input type="password" name="password"></label>

                <label>Confirm Password: <input type="password" name="confirm password"></label>

                <input type="submit" value="Submit">

                <a href="{% url 'login' %}" style="text-decoration: none;">Already have an account? Login here.</a>
            </form>
        </div>
    </div>
</body>

</html>
