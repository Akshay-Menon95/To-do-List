<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .card {
            background-color: #3300ff;
            color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(51, 0, 255, 0.15);
            text-align: left;
        }

        .card > h1:first-of-type {
            margin: 0 0 4px 0;
            font-size: 28px;
            font-weight: 700;
        }

        .logout h3 {
            margin: 0 0 24px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
        }

        .card div h1 {
            font-size: 20px;
            margin: 0 0 6px 0;
            font-weight: 500;
        }

        .card div h3 {
            font-size: 14px;
            margin: 0 0 20px 0;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 400;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="text"] {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #ffffff;
            background-color: rgba(255, 255, 255, 0.2);
        }

        button, input[type="submit"] {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        button:hover, input[type="submit"]:hover {
            opacity: 0.9;
        }

        button:active, input[type="submit"]:active {
            transform: scale(0.98);
        }

        form button[type="submit"] {
            background-color: #ffffff;
            color: #3300ff;
            padding: 12px;
            font-size: 16px;
        }

        .card h2 {
            font-size: 18px;
            margin: 0 0 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 8px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0 0 24px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        ul li {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 15px;
        }

        ul li::after {
            content: "";
            flex-grow: 1;
        }

        ul button {
            padding: 6px 12px;
            font-size: 12px;
            background-color: rgba(255, 255, 255, 0.15);
        }

        ul button a {
            color: #ffffff !important;
        }

        ul button:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        button a {
            display: inline-block;
            width: 100%;
            height: 100%;
            color: inherit;
        }

        .card > button:last-of-type {
            width: 100%;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 12px;
        }

        .card > button:last-of-type:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
        }
    </style>
</head>

<body>

    <div class="card-container">
        <div class="card">
            <h1>To Do List</h1>
            <div class="logout">
                <h3>Dashboard</h3>
            </div>

            <div>
                <h1>Welcome {{ user.username }}</h1>
                <h3>Your To Do List</h3>
            </div>

            <form method="post">
                {% csrf_token %}
                <label>Enter to do tasks: <input type="text" name="task"></label>
                <button type="submit">Add Task</button>
            </form>

            <h2>Your Tasks</h2>
            <ul>
                {% for task in tasks %}
                <li>
                    {{ task.task }}
                    <button>
                        <a href="{% url 'update' task.id %}" style="text-decoration: none;">Update</a>
                    </button>
                    <button> 
                        <a href="{% url 'delete' task.id %}" style="text-decoration: none;">Delete</a>
                    </button>
                </li>
                {% empty %}
                <li style="opacity: 0.6; background: none; justify-content: center;">No tasks added yet.</li>
                {% endfor %}
            </ul>

            <button>
                <a href="{% url 'login' %}" style="text-decoration: none;">Logout</a>
            </button> 
        </div>
    </div>

</body>

</html>
